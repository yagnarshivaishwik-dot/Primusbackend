# =============================================================
# Docker Compose override for capacity load testing.
# =============================================================
# Use with:
#   sudo docker compose -f docker-compose.yml -f docker-compose.loadtest.yml up -d backend
#
# This bumps:
#   - RATE_LIMIT_PER_MINUTE  : 1000 -> 1,000,000  (effectively unlimited)
#   - RATE_LIMIT_BURST       : 100  -> 10,000
#   - uvicorn worker count   : 1    -> 4
#
# To revert, just bring the stack back up without -f docker-compose.loadtest.yml
# =============================================================

services:
  backend:
    environment:
      - RATE_LIMIT_PER_MINUTE=1000000
      - RATE_LIMIT_BURST=10000
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "4"
