version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: primus-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - primus-backend

volumes:
  redis-data:

networks:
  primus-backend:
    driver: bridge

