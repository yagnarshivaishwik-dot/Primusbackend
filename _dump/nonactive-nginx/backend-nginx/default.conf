worker_processes  1;

events {
    worker_connections  1024;
}

http {
    sendfile        on;
    keepalive_timeout  65;

    upstream primus_backend {
        server backend:8000;
    }

    server {
        listen 80;

        # Redirect all HTTP traffic to HTTPS if needed (handled by Cloudflare usually, but good to have)
        # return 301 https://$host$request_uri;

        location / {
            proxy_pass         http://primus_backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # MASTER SYSTEM: Optimized for SSE (Server-Sent Events)
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
        }

        # Health check endpoint
        location /api/health {
            proxy_pass http://primus_backend/api/health;
        }
    }
}


